name: Exact item alert emails

on:
  workflow_dispatch:

jobs:
  exact-item-alerts:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore exact-item alert state
        run: |
          mkdir -p .state
          if git ls-remote --exit-code --heads origin state >/dev/null 2>&1; then
            git fetch origin state --depth=1
            git checkout origin/state -- .state || true
            git reset .state
            echo "Restored .state from origin/state."
          else
            echo "No origin/state branch yet. Starting with local/default state."
          fi

      - name: Parse new Discord submissions
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          python scripts/parse_discord_alerts.py --incremental --output review-queue/alerts.json

      - name: Send exact-item alert emails
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_USE_TLS: "true"
          SITE_BASE_URL: "https://dealledger.eu"
        run: |
          python scripts/send_exact_item_alerts.py

      - name: Persist state updates to state branch
        run: |
          if git diff --quiet -- .state; then
            echo "No state changes."
            exit 0
          fi

          state_tmp="$(mktemp -d)"
          cp -R .state "${state_tmp}/.state"

          if git ls-remote --exit-code --heads origin state >/dev/null 2>&1; then
            git fetch origin state --depth=1
            git checkout -B state origin/state
          else
            git checkout --orphan state
            git rm -rf . >/dev/null 2>&1 || true
          fi

          rm -rf .state
          mkdir -p .state
          cp -R "${state_tmp}/.state/." .state/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .state
          if git diff --cached --quiet; then
            echo "No state changes after syncing state branch."
            exit 0
          fi
          git commit -m "chore: update exact-item alert state"
          git push origin HEAD:state
