name: Refresh listing discounts

on:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * *"

jobs:
  refresh-discounts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate and refresh stale prices
        run: python scripts/validate_discount_freshness.py --apply

      - name: Commit and push changes
        run: |
          if git diff --quiet -- content/deals; then
            echo "No stale discount updates found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/deals
          git commit -m "chore: refresh listing prices and discounts"
          git push
