<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Netlify Form Definition</title>
  </head>
  <body>
    <form name="alert-request" method="POST" data-netlify="true" data-netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="alert-request">
      <input type="text" name="bot-field">
      <input type="email" name="email">
      <input type="text" name="cadence">
      <input type="text" name="categories">
      <input type="text" name="keywords">
      <textarea name="notes"></textarea>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
