<link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | relURL }}">
<link rel="shortcut icon" href="{{ "favicon.svg" | relURL }}">
<link rel="apple-touch-icon" href="{{ "favicon.svg" | relURL }}">
{{ if hugo.IsServer }}
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https: ws: wss:; object-src 'none'; base-uri 'self'; form-action 'self'">
{{ else }}
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
{{ end }}
<link rel="stylesheet" href="{{ "styles/site.css" | relURL }}?v={{ now.Unix }}">
