<footer class="site-footer" role="contentinfo">
  <div class="site-footer__inner">
    <div class="site-footer__brand">
      <a class="site-footer__title" href="{{ .Site.Home.RelPermalink }}" aria-label="{{ .Site.Title }}">
        <img class="site-footer__logo" src="{{ "images/brand/deal-ledger-logo.svg" | relURL }}" alt="{{ .Site.Title }}" width="186" height="48" loading="lazy" decoding="async">
      </a>
    </div>
    <nav class="site-footer__nav" aria-label="Footer">
      <a href="{{ "about/" | relURL }}">About</a>
      <a href="{{ "privacy/" | relURL }}">Privacy</a>
      <a href="{{ "disclosure/" | relURL }}">Disclosure</a>
    </nav>
    <div class="site-footer__meta">
      <span>&copy; {{ .Site.Title }} {{ now.Format "2006" }}</span>
      <div class="site-footer__social">{{ partials.IncludeCached "social/follow.html" . }}</div>
    </div>
  </div>
</footer>
