<script>
  document.addEventListener('DOMContentLoaded', () => {
    const menu = document.querySelector('[data-nav-menu]');
    if (!menu) return;

    const toggle = menu.querySelector('.nav-menu__toggle');
    const links = menu.querySelector('.nav-links');
    if (!toggle || !links) return;

    const closeMenu = () => {
      menu.classList.remove('is-open');
      toggle.setAttribute('aria-expanded', 'false');
    };

    toggle.addEventListener('click', () => {
      const isOpen = menu.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    links.querySelectorAll('a').forEach((link) => {
      link.addEventListener('click', closeMenu);
    });

    document.addEventListener('click', (event) => {
      if (!menu.contains(event.target)) closeMenu();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeMenu();
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth > 960) closeMenu();
    });

    const marketSelect = document.getElementById('market-select');
    if (marketSelect) {
      const cookieMap = (document.cookie || '')
        .split(';')
        .map((item) => item.trim())
        .filter(Boolean)
        .reduce((acc, item) => {
          const eqIdx = item.indexOf('=');
          if (eqIdx === -1) return acc;
          const key = item.slice(0, eqIdx).trim();
          const value = item.slice(eqIdx + 1).trim();
          acc[key] = value;
          return acc;
        }, {});

      if (cookieMap.market === 'us' || cookieMap.market === 'eu' || cookieMap.market === 'de' || cookieMap.market === 'nl' || cookieMap.market === 'fr') {
        marketSelect.value = cookieMap.market;
      }

      marketSelect.addEventListener('change', () => {
        const allowedMarkets = new Set(['eu', 'us', 'de', 'nl', 'fr']);
        const targetMarket = allowedMarkets.has(marketSelect.value) ? marketSelect.value : 'eu';
        const secure = window.location.protocol === 'https:' ? '; Secure' : '';
        document.cookie = `market=${targetMarket}; Path=/; Max-Age=31536000; SameSite=Lax${secure}`;
        const targetPath = targetMarket === 'eu' ? '/' : `/${targetMarket}/`;
        window.location.assign(`${window.location.origin}${targetPath}`);
      });
    }
  });
</script>
